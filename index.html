<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  background:#fff;
  color:#000;
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  z-index:100;
  background:rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
}

nav a{
  text-decoration:none;
  color:#000;
  font-size:14px;
  margin-left:20px;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1{
  font-size:64px;
  font-weight:400;
  letter-spacing:-2px;
}

/* GRID */
.projects{
  padding:120px 40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
  gap:40px;
}

.card{
  position:relative;
  overflow:hidden;
}

.card img{
  width:100%;
  height:500px;
  object-fit:cover;
  transition:transform .6s ease;
}

.card:hover img{
  transform:scale(1.05);
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:flex;
  align-items:flex-end;
  opacity:0;
  transition:.4s;
}

.card:hover .overlay{
  opacity:1;
}

.overlay h3{
  color:#fff;
  padding:20px;
  font-weight:400;
}

/* ABOUT */
.about{
  padding:120px 40px;
  max-width:800px;
}

.about h2{
  font-size:32px;
  margin-bottom:20px;
}

.about p{
  font-size:16px;
  line-height:1.7;
  color:#444;
}

/* FOOTER */
footer{
  padding:60px 40px;
  border-top:1px solid #ddd;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

footer a{
  text-decoration:none;
  color:#000;
  margin-left:20px;
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero h1{font-size:42px;}
  .card img{height:350px;}
}
</style>
</head>

<body>

<nav>
  <div>YOUR NAME</div>
  <div>
    <a href="#work">Work</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Visual Designer<br>Creative Direction</h1>
</section>

<section id="work" class="projects">
  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1526948128573-703ee1aeb6fa">
      <div class="overlay"><h3>Project One</h3></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
      <div class="overlay"><h3>Project Two</h3></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
      <div class="overlay"><h3>Project Three</h3></div>
    </div>

  </div>
</section>

<section id="about" class="about">
  <h2>About</h2>
  <p>
    I’m a visual designer focused on clean aesthetics, storytelling, and
    minimal digital experiences.
  </p>
</section>

<footer id="contact">
  <div>© 2026 Your Name</div>
  <div>
    <a href="#">Instagram</a>
    <a href="#">Behance</a>
    <a href="#">Email</a>
  </div>
</footer>

</body>
</html>
