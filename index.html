<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  background:#fff;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:72px;
  font-weight:400;
  letter-spacing:-2px;
}

/* ===== 3 LAYER VERTICAL ===== */
.vertical-wrapper{
  height:200vh;
  overflow:hidden;
  padding:0 40px;
}

.vertical-gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:40px;
  height:100vh;
}

/* COLUMN */
.layer{
  display:flex;
  flex-direction:column;
  gap:40px;
  will-change:transform;
}

.layer img{
  width:100%;
  height:520px;
  object-fit:cover;
  border-radius:14px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .vertical-gallery{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<section class="hero">
  <h1>Visual Designer<br>Creative Direction</h1>
</section>

<!-- ===== VERTICAL 3 LAYER ===== -->
<section class="vertical-wrapper">
  <div class="vertical-gallery">

    <!-- KIRI – KE BAWAH -->
    <div class="layer" data-speed="0.5">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
      <img src="https://images.unsplash.com/photo-1526948128573-703ee1aeb6fa">
      <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    </div>

    <!-- TENGAH – KE ATAS -->
    <div class="layer" data-speed="-0.7">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
    </div>

    <!-- KANAN – KE BAWAH -->
    <div class="layer" data-speed="0.5">
      <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
      <img src="https://images.unsplash.com/photo-1517433456452-f9633a875f6f">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
      <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
    </div>

  </div>
</section>

<script>
const layers = document.querySelectorAll('.layer');

window.addEventListener('scroll', () => {
  const scroll = window.scrollY;

  layers.forEach(layer => {
    const speed = layer.dataset.speed;
    layer.style.transform = `translateY(${scroll * speed}px)`;
  });
});
</script>

</body>
</html>
