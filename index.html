<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMD Design</title>

<!-- ===== FONT ===== -->
<style>
@font-face{font-family:'Gendy';src:url('fonts/gendy.ttf');}
@font-face{font-family:'Noir';src:url('fonts/noir.ttf');}
@font-face{font-family:'Android';src:url('fonts/android.ttf');}
</style>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Gendy';
  background:linear-gradient(135deg,#949398,#004146);
  color:#fff;
  overflow-x:hidden;
  cursor:none;
}

/* ===== NOISE ===== */
.noise{
  position:fixed;
  inset:0;
  background:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:.08;
  pointer-events:none;
  z-index:1;
}

/* ===== BACKGROUND PARALLAX ===== */
.bg{
  position:fixed;
  inset:0;
  z-index:-2;
  overflow:hidden;
}
.layer{
  position:absolute;
  border-radius:100px;
  background:rgba(255,255,255,.08);
}
.l1{width:120%;height:140px;top:15%;animation:parallax 40s linear infinite;}
.l2{width:80px;height:120%;left:10%;animation:parallaxV 55s linear infinite;}
.l3{width:100px;height:120%;left:75%;animation:parallaxV 70s linear infinite reverse;}

@keyframes parallax{from{transform:translateX(-20%);}to{transform:translateX(20%);}}
@keyframes parallaxV{from{transform:translateY(-20%);}to{transform:translateY(20%);}}

/* ===== CUSTOM CURSOR ===== */
.cursor{
  width:18px;
  height:18px;
  border:2px solid #fff;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  transition:.15s ease;
}
.cursor.active{
  transform:translate(-50%,-50%) scale(2);
  background:rgba(255,255,255,.15);
}

/* ===== NAV ===== */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:22px 48px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,.25);
  backdrop-filter:blur(14px);
  z-index:100;
}
.brand{font-family:'Android';letter-spacing:2px;font-size:14px;}
.menu a{
  margin-left:28px;
  text-decoration:none;
  font-size:12px;
  color:#fff;
  opacity:.8;
}
.menu a:hover{opacity:1}

/* ===== HAMBURGER ===== */
.burger{
  display:none;
  flex-direction:column;
  gap:6px;
  cursor:pointer;
}
.burger span{
  width:22px;height:2px;background:#fff;
}

/* ===== MOBILE MENU ===== */
.mobile-menu{
  position:fixed;
  top:0;right:-100%;
  width:70%;
  height:100%;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(20px);
  padding:120px 40px;
  transition:.5s ease;
  z-index:200;
}
.mobile-menu a{
  display:block;
  margin-bottom:28px;
  font-family:'Noir';
  font-size:22px;
  text-decoration:none;
  color:#fff;
}
.mobile-menu.active{right:0}

/* ===== HERO ===== */
.hero{
  min-height:100vh;
  padding:160px 48px 80px;
}
.hero h1{
  font-family:'Noir';
  font-size:72px;
  line-height:1.05;
}
.hero p{
  margin-top:30px;
  max-width:520px;
  opacity:.85;
}

/* ===== KARYA ===== */
section{padding:140px 48px}
h2{font-family:'Noir';font-size:36px;margin-bottom:48px}

.track{
  display:flex;
  gap:40px;
  width:max-content;
  animation:scroll 45s linear infinite;
}
.track img{
  width:380px;height:240px;
  object-fit:cover;
  border-radius:24px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}

@keyframes scroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* ===== FOOTER ===== */
footer{
  padding:100px 48px;
  border-top:1px solid rgba(255,255,255,.2);
  display:flex;
  justify-content:space-between;
  font-size:13px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  body{cursor:auto}
  .menu{display:none}
  .burger{display:flex}
  .hero h1{font-size:42px}
  .track img{width:260px;height:180px}
}
</style>
</head>

<body>

<div class="cursor"></div>
<div class="noise"></div>

<div class="bg">
  <div class="layer l1"></div>
  <div class="layer l2"></div>
  <div class="layer l3"></div>
</div>

<nav>
  <div class="brand">AMD DESIGN</div>
  <div class="menu">
    <a href="#">Work</a>
    <a href="#">About</a>
    <a href="#">Price</a>
    <a href="#">Contact</a>
  </div>
  <div class="burger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="#">Work</a>
  <a href="#">About</a>
  <a href="#">Price</a>
  <a href="#">Contact</a>
</div>

<section class="hero">
  <h1>Aiman<br>Sports Graphic Designer</h1>
  <p>Modern football visuals for players and academies worldwide.</p>
</section>

<section>
  <h2>Karya</h2>
  <div style="overflow:hidden">
    <div class="track">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
      <img src="https://images.unsplash.com/photo-1526948128573-703ee1aeb6fa">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
    </div>
  </div>
</section>

<footer>
  <div>© 2026 AMD Design</div>
  <div>@amddesignn_ | +62 81932787003</div>
</footer>

<script>
const cursor=document.querySelector('.cursor');
document.addEventListener('mousemove',e=>{
  cursor.style.left=e.clientX+'px';
  cursor.style.top=e.clientY+'px';
});
document.querySelectorAll('a,img').forEach(el=>{
  el.addEventListener('mouseenter',()=>cursor.classList.add('active'));
  el.addEventListener('mouseleave',()=>cursor.classList.remove('active'));
});
function toggleMenu(){
  document.getElementById('mobileMenu').classList.toggle('active');
}
</script>

</body>
</html>
