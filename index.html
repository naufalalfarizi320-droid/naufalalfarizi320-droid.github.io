<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  background:#fff;
  color:#000;
  overflow:hidden;
}

/* ===== MENU ===== */
nav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:22px 40px;
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

nav .logo{
  font-size:14px;
}

nav .menu a{
  font-size:13px;
  text-decoration:none;
  color:#000;
  margin-left:28px;
  opacity:.7;
}

nav .menu a:hover{
  opacity:1;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:72px;
  font-weight:400;
  letter-spacing:-2px;
}

/* ===== AUTO GALLERY ===== */
.gallery-wrapper{
  position:relative;
  height:100vh;
  padding:0 40px;
  overflow:hidden;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:40px;
  height:100%;
}

/* COLUMN */
.column{
  position:relative;
}

.track{
  position:absolute;
  top:0;
  left:0;
  right:0;
  display:flex;
  flex-direction:column;
  gap:40px;
  will-change:transform;
}

.track img{
  width:100%;
  height:520px;
  object-fit:cover;
  border-radius:14px;
}

/* RESPONSIVE */
@media(max-width:900px){
  body{overflow:auto;}
  .gallery{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- MENU -->
<nav>
  <div class="logo">YOUR NAME</div>
  <div class="menu">
    <a href="#">Work</a>
    <a href="#">Projects</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Visual Designer<br>Creative Direction</h1>
</section>

<!-- AUTO MOVING GALLERY -->
<section class="gallery-wrapper">
  <div class="gallery">

    <!-- LEFT (DOWN) -->
    <div class="column" data-speed="0.25">
      <div class="track">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
        <img src="https://images.unsplash.com/photo-1526948128573-703ee1aeb6fa">
        <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97">
        <!-- DUPLIKASI -->
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
        <img src="https://images.unsplash.com/photo-1526948128573-703ee1aeb6fa">
        <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97">
      </div>
    </div>

    <!-- CENTER (UP) -->
    <div class="column" data-speed="-0.35">
      <div class="track">
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
        <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
        <!-- DUPLIKASI -->
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
        <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
      </div>
    </div>

    <!-- RIGHT (DOWN) -->
    <div class="column" data-speed="0.25">
      <div class="track">
        <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
        <img src="https://images.unsplash.com/photo-1517433456452-f9633a875f6f">
        <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
        <!-- DUPLIKASI -->
        <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
        <img src="https://images.unsplash.com/photo-1517433456452-f9633a875f6f">
        <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
      </div>
    </div>

  </div>
</section>

<script>
/* ===== SEAMLESS AUTO VERTICAL MOTION ===== */

const columns = document.querySelectorAll('.column');

columns.forEach(col => {
  col.y = 0;
});

function animate(){
  columns.forEach(col => {
    const track = col.querySelector('.track');
    const speed = parseFloat(col.dataset.speed);
    const height = track.scrollHeight / 2;

    col.y += speed;
    if (col.y >= height) col.y = 0;
    if (col.y <= -height) col.y = 0;

    track.style.transform = `translateY(${-col.y}px)`;
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
