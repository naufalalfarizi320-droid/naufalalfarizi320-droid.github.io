<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  background:#fff;
  color:#000;
  overflow-x:hidden;
}

/* ===== LUXURY NAV ===== */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:26px 50px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
  background:rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);
}

.logo{
  font-size:13px;
  letter-spacing:2px;
  text-transform:uppercase;
}

.menu{
  display:flex;
  gap:36px;
}

.menu a{
  font-size:12px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  text-decoration:none;
  color:#000;
  opacity:.6;
  position:relative;
}

.menu a::after{
  content:'';
  position:absolute;
  left:0;
  bottom:-6px;
  width:0;
  height:1px;
  background:#000;
  transition:.3s;
}

.menu a:hover{
  opacity:1;
}

.menu a:hover::after{
  width:100%;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:72px;
  font-weight:400;
  letter-spacing:-2px;
}

/* ===== GALLERY SECTION ===== */
.gallery-section{
  position:relative;
  height:200vh; /* SCROLL AREA */
  padding:120px 50px;
}

.gallery-wrapper{
  position:sticky;
  top:120px;
  height:80vh;
  overflow:hidden;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:40px;
  height:100%;
}

/* COLUMN */
.column{
  position:relative;
}

.track{
  position:absolute;
  top:0;
  left:0;
  right:0;
  display:flex;
  flex-direction:column;
  gap:40px;
  will-change:transform;
}

.track img{
  width:100%;
  height:520px;
  object-fit:cover;
  border-radius:18px;
}

/* FOOTER */
footer{
  padding:120px 50px;
  font-size:13px;
  display:flex;
  justify-content:space-between;
  border-top:1px solid #eee;
}

/* RESPONSIVE */
@media(max-width:900px){
  .gallery{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">Your Name</div>
  <div class="menu">
    <a href="#">Work</a>
    <a href="#">Archive</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Visual Designer<br>Creative Direction</h1>
</section>

<!-- GALLERY -->
<section class="gallery-section">
  <div class="gallery-wrapper">
    <div class="gallery">

      <!-- LEFT -->
      <div class="column" data-speed="0.25">
        <div class="track">
          <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
          <img src="https://images.unsplash.com/photo-1526948128573-703ee1aeb6fa">
          <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97">
          <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
          <img src="https://images.unsplash.com/photo-1526948128573-703ee1aeb6fa">
        </div>
      </div>

      <!-- CENTER -->
      <div class="column" data-speed="-0.35">
        <div class="track">
          <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
          <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
          <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
          <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
          <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
        </div>
      </div>

      <!-- RIGHT -->
      <div class="column" data-speed="0.25">
        <div class="track">
          <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
          <img src="https://images.unsplash.com/photo-1517433456452-f9633a875f6f">
          <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
          <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
          <img src="https://images.unsplash.com/photo-1517433456452-f9633a875f6f">
        </div>
      </div>

    </div>
  </div>
</section>

<footer>
  <div>© 2026 Your Name</div>
  <div>Instagram · Behance · Email</div>
</footer>

<script>
/* AUTO ANIMATION – INFINITE */
const columns = document.querySelectorAll('.column');

columns.forEach(col => col.y = 0);

function animate(){
  columns.forEach(col => {
    const track = col.querySelector('.track');
    const speed = parseFloat(col.dataset.speed);
    const limit = track.scrollHeight / 2;

    col.y += speed;
    if (col.y > limit) col.y = 0;
    if (col.y < -limit) col.y = 0;

    track.style.transform = `translateY(${-col.y}px)`;
  });
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
