<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  background:#fff;
  color:#000;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:72px;
  font-weight:400;
  letter-spacing:-2px;
}

/* ===== PARALLAX SECTION ===== */
.parallax-section{
  position:relative;
  height:220vh;
  padding:0 40px;
}

.parallax-gallery{
  position:sticky;
  top:0;
  height:100vh;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:40px;
  overflow:hidden;
}

/* COLUMNS */
.column{
  display:flex;
  flex-direction:column;
  gap:40px;
  will-change:transform;
}

.column img{
  width:100%;
  height:520px;
  object-fit:cover;
  border-radius:14px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .parallax-gallery{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<section class="hero">
  <h1>Visual Designer<br>Creative Direction</h1>
</section>

<section class="parallax-section" id="parallax">
  <div class="parallax-gallery">

    <!-- LEFT -->
    <div class="column" data-speed="0.4">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
      <img src="https://images.unsplash.com/photo-1526948128573-703ee1aeb6fa">
      <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    </div>

    <!-- CENTER (OPPOSITE) -->
    <div class="column" data-speed="-0.55">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
    </div>

    <!-- RIGHT -->
    <div class="column" data-speed="0.4">
      <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
      <img src="https://images.unsplash.com/photo-1517433456452-f9633a875f6f">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
      <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
    </div>

  </div>
</section>

<script>
/* ===== SMOOTH SCROLL INERTIA ENGINE ===== */

let currentScroll = window.scrollY;
let targetScroll = window.scrollY;
const ease = 0.08;

const section = document.getElementById('parallax');
const columns = document.querySelectorAll('.column');

window.addEventListener('scroll', () => {
  targetScroll = window.scrollY;
});

function animate(){
  currentScroll += (targetScroll - currentScroll) * ease;

  const rect = section.getBoundingClientRect();
  const progress = Math.min(
    Math.max((window.innerHeight - rect.top) / rect.height, 0),
    1
  );

  columns.forEach(col => {
    const speed = col.dataset.speed;
    col.style.transform = `translateY(${progress * 400 * speed}px)`;
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
