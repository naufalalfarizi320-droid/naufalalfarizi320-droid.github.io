<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  background:#fff;
  color:#000;
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  z-index:100;
  background:rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
}

nav a{
  text-decoration:none;
  color:#000;
  font-size:14px;
  margin-left:20px;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1{
  font-size:72px;
  font-weight:400;
  letter-spacing:-2px;
}

/* ===== VERTICAL SCROLL GALLERY ===== */
.gallery-wrapper{
  height:160vh;
  overflow:hidden;
  padding:120px 40px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:40px;
}

.column{
  display:flex;
  flex-direction:column;
  gap:40px;
  will-change:transform;
}

.column img{
  width:100%;
  height:520px;
  object-fit:cover;
  border-radius:16px;
}

/* WORK GRID */
.projects{
  padding:120px 40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
  gap:40px;
}

.card img{
  width:100%;
  height:500px;
  object-fit:cover;
  border-radius:16px;
}

/* ABOUT */
.about{
  padding:120px 40px;
  max-width:800px;
}

.about h2{
  font-size:32px;
  margin-bottom:20px;
}

.about p{
  font-size:16px;
  line-height:1.7;
  color:#444;
}

/* FOOTER */
footer{
  padding:60px 40px;
  border-top:1px solid #ddd;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .gallery{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<nav>
  <div>YOUR NAME</div>
  <div>
    <a href="#work">Work</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Visual Designer<br>Creative Direction</h1>
</section>

<!-- ===== VERTICAL MOVING IMAGES ===== -->
<section class="gallery-wrapper">
  <div class="gallery">

    <div class="column" data-speed="0.6">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
      <img src="https://images.unsplash.com/photo-1526948128573-703ee1aeb6fa">
      <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    </div>

    <div class="column" data-speed="-0.4">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
    </div>

    <div class="column" data-speed="0.8">
      <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
      <img src="https://images.unsplash.com/photo-1517433456452-f9633a875f6f">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
      <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
    </div>

  </div>
</section>

<section id="work" class="projects">
  <div class="grid">
    <div class="card"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1526948128573-703ee1aeb6fa"></div>
  </div>
</section>

<section id="about" class="about">
  <h2>About</h2>
  <p>
    I’m a visual designer focused on editorial layouts, motion-based
    interactions, and modern portfolio experiences inspired by high-end
    creative websites.
  </p>
</section>

<footer id="contact">
  <div>© 2026 Your Name</div>
  <div>
    <a href="#">Instagram</a>
    <a href="#">Behance</a>
    <a href="#">Email</a>
  </div>
</footer>

<script>
const columns = document.querySelectorAll('.column');

window.addEventListener('scroll', () => {
  const scrollY = window.scrollY;

  columns.forEach(col => {
    const speed = col.dataset.speed;
    col.style.transform = `translateY(${scrollY * speed}px)`;
  });
});
</script>

</body>
</html>
