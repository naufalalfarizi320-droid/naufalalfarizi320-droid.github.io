<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  background:#fff;
  color:#000;
}

/* ===== NAVBAR ===== */
nav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:24px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
  pointer-events:auto;
}

nav .logo{
  font-size:14px;
  font-weight:400;
}

nav .menu a{
  font-size:13px;
  text-decoration:none;
  color:#000;
  margin-left:28px;
  opacity:.8;
}

nav .menu a:hover{
  opacity:1;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:72px;
  font-weight:400;
  letter-spacing:-2px;
}

/* ===== PARALLAX SECTION ===== */
.parallax-section{
  position:relative;
  height:220vh;
  padding:0 40px;
}

.parallax-gallery{
  position:sticky;
  top:0;
  height:100vh;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:40px;
  overflow:hidden;
}

/* COLUMNS */
.column{
  display:flex;
  flex-direction:column;
  gap:40px;
  will-change:transform;
}

.column img{
  width:100%;
  height:520px;
  object-fit:cover;
  border-radius:14px;
}

/* SECTIONS */
.section{
  padding:160px 40px;
  max-width:900px;
}

.section h2{
  font-size:32px;
  font-weight:400;
  margin-bottom:24px;
}

.section p{
  font-size:16px;
  line-height:1.7;
  color:#444;
}

/* RESPONSIVE */
@media(max-width:900px){
  .parallax-gallery{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- ===== NAV ===== -->
<nav>
  <div class="logo">YOUR NAME</div>
  <div class="menu">
    <a href="#work">Work</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Visual Designer<br>Creative Direction</h1>
</section>

<!-- ===== PARALLAX ===== -->
<section class="parallax-section" id="work">
  <div class="parallax-gallery">

    <!-- LEFT -->
    <div class="column" data-speed="0.4">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
      <img src="https://images.unsplash.com/photo-1526948128573-703ee1aeb6fa">
      <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97">
    </div>

    <!-- CENTER -->
    <div class="column" data-speed="-0.55">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
    </div>

    <!-- RIGHT -->
    <div class="column" data-speed="0.4">
      <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
      <img src="https://images.unsplash.com/photo-1517433456452-f9633a875f6f">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
    </div>

  </div>
</section>

<section id="about" class="section">
  <h2>About</h2>
  <p>
    I’m a visual designer focused on editorial layouts, subtle motion,
    and premium digital experiences inspired by contemporary portfolios.
  </p>
</section>

<section id="contact" class="section">
  <h2>Contact</h2>
  <p>
    Instagram · Behance · Email
  </p>
</section>

<script>
/* ===== SMOOTH SCROLL INERTIA ===== */
let currentScroll = window.scrollY;
let targetScroll = window.scrollY;
const ease = 0.08;

const section = document.querySelector('.parallax-section');
const columns = document.querySelectorAll('.column');

window.addEventListener('scroll', () => {
  targetScroll = window.scrollY;
});

function raf(){
  currentScroll += (targetScroll - currentScroll) * ease;

  const rect = section.getBoundingClientRect();
  const progress = Math.min(
    Math.max((window.innerHeight - rect.top) / rect.height, 0),
    1
  );

  columns.forEach(col => {
    const speed = col.dataset.speed;
    col.style.transform = `translateY(${progress * 400 * speed}px)`;
  });

  requestAnimationFrame(raf);
}
raf();
</script>

</body>
</html>
