<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  background:#fff;
  color:#000;
  overflow:hidden;
}

/* ===== MENU ===== */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:22px 40px;
  display:flex;
  justify-content:space-between;
  z-index:100;
}

nav .logo{
  font-size:14px;
}

nav .menu a{
  font-size:13px;
  text-decoration:none;
  color:#000;
  margin-left:28px;
  opacity:.7;
}

nav .menu a:hover{
  opacity:1;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:72px;
  font-weight:400;
  letter-spacing:-2px;
}

/* ===== AUTO VERTICAL GALLERY ===== */
.gallery-wrapper{
  position:relative;
  height:100vh;
  padding:0 40px;
  overflow:hidden;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:40px;
}

/* COLUMN */
.column{
  display:flex;
  flex-direction:column;
  gap:40px;
  will-change:transform;
}

.column img{
  width:100%;
  height:520px;
  object-fit:cover;
  border-radius:14px;
}

/* RESPONSIVE */
@media(max-width:900px){
  body{overflow:auto;}
  .gallery{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- MENU -->
<nav>
  <div class="logo">YOUR NAME</div>
  <div class="menu">
    <a href="#">Work</a>
    <a href="#">Projects</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Visual Designer<br>Creative Direction</h1>
</section>

<!-- AUTO MOVING GALLERY -->
<section class="gallery-wrapper">
  <div class="gallery">

    <!-- LEFT (DOWN) -->
    <div class="column" data-speed="0.25">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
      <img src="https://images.unsplash.com/photo-1526948128573-703ee1aeb6fa">
      <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    </div>

    <!-- CENTER (UP) -->
    <div class="column" data-speed="-0.35">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
    </div>

    <!-- RIGHT (DOWN) -->
    <div class="column" data-speed="0.25">
      <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
      <img src="https://images.unsplash.com/photo-1517433456452-f9633a875f6f">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
      <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
    </div>

  </div>
</section>

<script>
/* ===== AUTO MOTION ENGINE ===== */
const columns = document.querySelectorAll('.column');
let offset = 0;

function animate(){
  offset += 0.3; // speed global

  columns.forEach(col => {
    const speed = col.dataset.speed;
    col.style.transform = `translateY(${offset * speed}px)`;
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
