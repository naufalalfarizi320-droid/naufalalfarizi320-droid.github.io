<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  background:#fff;
  color:#000;
  overflow-x:hidden;
}

/* ===== NAV ===== */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 32px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.65);
  backdrop-filter: blur(12px);
  z-index:1000;
}

.logo{
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
}

.menu{
  display:flex;
  gap:24px;
}

.menu a{
  font-size:11px;
  letter-spacing:1.2px;
  text-transform:uppercase;
  text-decoration:none;
  color:#000;
  opacity:.65;
}

.menu a:hover{opacity:1}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:0 20px;
}

.hero h1{
  font-size:64px;
  font-weight:400;
  letter-spacing:-2px;
}

/* ===== GALLERY ===== */
.gallery-section{
  height:200vh;
  padding:100px 32px;
}

.gallery-wrapper{
  position:sticky;
  top:100px;
  height:80vh;
  overflow:hidden;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:28px;
}

/* COLUMN */
.column{
  position:relative;
}

.track{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  gap:28px;
  will-change:transform;
}

.track img{
  width:100%;
  height:420px; /* LEBIH KECIL */
  object-fit:cover;
  border-radius:16px;
}

/* FOOTER */
footer{
  padding:100px 32px;
  font-size:12px;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-between;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .menu{display:none;}

  .hero h1{
    font-size:38px;
  }

  .gallery{
    grid-template-columns:1fr;
  }

  .gallery-wrapper{
    top:80px;
    height:75vh;
  }

  .track img{
    height:280px; /* UKURAN HP */
    border-radius:14px;
  }
}
</style>
</head>

<body>

<nav>
  <div class="logo">Your Name</div>
  <div class="menu">
    <a href="#">Work</a>
    <a href="#">Archive</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Visual Designer<br>Creative Direction</h1>
</section>

<section class="gallery-section">
  <div class="gallery-wrapper">
    <div class="gallery">

      <div class="column" data-speed="0.25">
        <div class="track">
          <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
          <img src="https://images.unsplash.com/photo-1526948128573-703ee1aeb6fa">
          <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97">
          <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
        </div>
      </div>

      <div class="column" data-speed="-0.35">
        <div class="track">
          <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
          <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
          <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
          <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
        </div>
      </div>

      <div class="column" data-speed="0.25">
        <div class="track">
          <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
          <img src="https://images.unsplash.com/photo-1517433456452-f9633a875f6f">
          <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
          <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
        </div>
      </div>

    </div>
  </div>
</section>

<footer>
  <div>© 2026 Your Name</div>
  <div>Instagram · Behance · Email</div>
</footer>

<script>
const columns = document.querySelectorAll('.column');
columns.forEach(c => c.y = 0);

function animate(){
  columns.forEach(col => {
    const track = col.querySelector('.track');
    const speed = parseFloat(col.dataset.speed);
    const limit = track.scrollHeight / 2;

    col.y += speed;
    if(col.y > limit) col.y = 0;
    if(col.y < -limit) col.y = 0;

    track.style.transform = `translateY(${-col.y}px)`;
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
