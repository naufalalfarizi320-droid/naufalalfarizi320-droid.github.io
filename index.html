<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  background:#fff;
  overflow:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:72px;
  font-weight:400;
  letter-spacing:-2px;
}

/* ===== CORE GALLERY ===== */
.gallery-wrapper{
  position:relative;
  height:100vh;
  overflow:hidden;
  padding:0 40px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:40px;
  height:200vh;
}

/* COLUMN */
.column{
  display:flex;
  flex-direction:column;
  gap:40px;
}

.column img{
  width:100%;
  height:520px;
  object-fit:cover;
  border-radius:14px;
}

/* ANIMATIONS */
.move-down{
  animation: down 35s linear infinite;
}

.move-up{
  animation: up 35s linear infinite;
}

@keyframes down{
  from{ transform:translateY(0); }
  to{ transform:translateY(-50%); }
}

@keyframes up{
  from{ transform:translateY(-50%); }
  to{ transform:translateY(0); }
}

/* RESPONSIVE */
@media(max-width:900px){
  .gallery{
    grid-template-columns:1fr;
    height:auto;
  }
  body{overflow:auto;}
}
</style>
</head>

<body>

<section class="hero">
  <h1>Visual Designer<br>Creative Direction</h1>
</section>

<section class="gallery-wrapper">
  <div class="gallery">

    <!-- LEFT (DOWN) -->
    <div class="column move-down">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
      <img src="https://images.unsplash.com/photo-1526948128573-703ee1aeb6fa">
      <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    </div>

    <!-- CENTER (UP) -->
    <div class="column move-up">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
    </div>

    <!-- RIGHT (DOWN) -->
    <div class="column move-down">
      <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
      <img src="https://images.unsplash.com/photo-1517433456452-f9633a875f6f">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
      <img src="https://images.unsplash.com/photo-1487014679447-9f8336841d58">
    </div>

  </div>
</section>

</body>
</html>
